<!DOCTYPE html>
<html>
<head>
  <title>Postcode Route Mapper</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
    h2 { margin-top: 0; }
    #container { display: flex; gap: 20px; flex-wrap: wrap; }
    #input-area { width: 100%; max-width: 300px; }
    textarea { 
      width: 100%; 
      height: 400px; 
      padding: 10px; 
      font-family: monospace; 
      border: 1px solid #ccc; 
      border-radius: 4px;
    }
    button { 
      width: 100%; 
      padding: 10px; 
      margin-top: 10px; 
      background-color: #007bff; 
      color: white; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-weight: bold;
    }
    button:hover { background-color: #0056b3; }
    #map { height: 600px; flex-grow: 1; min-width: 400px; border: 2px solid #ccc; border-radius: 4px; }
    .help-text { font-size: 0.9em; color: #555; }
  </style>
</head>
<body>

  <h2>Custom Postcode Mapper</h2>
  <div id="container">
    <div id="input-area">
      <p class="help-text">Paste postcodes and colours line by line.<br>Format: <b>postcode,colour</b></p>
      <textarea id="dataInput">bh12 4bz,blue&#10;BH12 4LL,black&#10;BH1 1AA,red</textarea>
      <button onclick="plotMap()">Plot on Map</button>
    </div>
    <div id="map"></div>
  </div>

  <script>
    // 1. Initialize the map (starts centered near Poole/Bournemouth)
    const map = L.map('map').setView([50.73, -1.98], 11);
    
    // 2. Load the free OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // Create a layer group to hold our pins so we can easily clear them
    let markers = L.layerGroup().addTo(map);

    async function plotMap() {
      markers.clearLayers(); // Clear map on new button click
      
      const rawText = document.getElementById('dataInput').value;
      const lines = rawText.split('\n');
      const dataPoints = [];
      const postcodesToLookup = [];

      // 3. Read the text box line by line
      for (let line of lines) {
        line = line.trim();
        if (!line) continue;
        
        const parts = line.split(',');
        if (parts.length >= 2) {
          const postcode = parts[0].trim();
          const color = parts[1].trim();
          dataPoints.push({ postcode, color });
          postcodesToLookup.push(postcode);
        }
      }

      if (postcodesToLookup.length === 0) return alert('No valid data found! Ensure format is postcode,colour');

      // 4. Send bulk request to Postcodes.io
      try {
        const response = await fetch('https://api.postcodes.io/postcodes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ postcodes: postcodesToLookup })
        });
        const apiData = await response.json();

        let validCount = 0;

        // 5. Match the API coordinates back to your custom colours
        apiData.result.forEach(item => {
          if (item.result) { // If postcode is valid
            const lat = item.result.latitude;
            const lng = item.result.longitude;
            const queryPc = item.query;

            // Find the colour assigned to this postcode (ignoring spaces and capitals)
            const match = dataPoints.find(dp => 
              dp.postcode.replace(/\s+/g, '').toLowerCase() === queryPc.replace(/\s+/g, '').toLowerCase()
            );

            if (match) {
              // Plot a coloured circle marker
              L.circleMarker([lat, lng], {
                radius: 10,
                fillColor: match.color,
                color: '#000', // Black outline
                weight: 2,
                fillOpacity: 1
              }).bindPopup(`<b>${item.result.postcode}</b>`).addTo(markers);
              validCount++;
            }
          }
        });

        // 6. Adjust the map zoom to fit all the new pins perfectly
        if (validCount > 0) {
          const group = new L.featureGroup(markers.getLayers());
          map.fitBounds(group.getBounds().pad(0.1));
        } else {
          alert("Could not find coordinates. Please check your postcodes.");
        }

      } catch (error) {
        console.error(error);
        alert('There was an error communicating with the Postcode server.');
      }
    }
  </script>
</body>
</html>
